name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - 'apps/worker/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploy Worker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WORKER_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/rceEngine
            chmod +x infra/scripts/deploy-worker.sh
            ./infra/scripts/deploy-worker.sh